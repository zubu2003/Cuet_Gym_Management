<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management | CUET Gym Assistant</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/students.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <nav class="admin-navbar">
        <div class="logo">
            <span class="logo-icon">👑</span>
            <span class="logo-text">CUET<span>GYM</span></span>
            <span class="admin-badge">ADMIN</span>
        </div>
        <div class="nav-right">
            <span class="admin-name">Admin Panel</span>
            <button class="logout-btn" id="logoutBtn"><span class="material-icons">logout</span> Logout</button>
        </div>
    </nav>

    <aside class="admin-sidebar" id="sidebar">
        <ul class="sidebar-menu">
            <li><a href="index.html"><span class="material-icons">dashboard</span> Dashboard</a></li>
            <li class="active"><a href="students.html"><span class="material-icons">people</span> Student Management</a></li>
            <li><a href="qr-manager.html"><span class="material-icons">qr_code</span> Dynamic QR</a></li>
            <li><a href="logs.html"><span class="material-icons">history</span> Entry/Exit Logs</a></li>
            <li><a href="analytics.html"><span class="material-icons">bar_chart</span> Analytics</a></li>
            <li><a href="equipment.html"><span class="material-icons">fitness_center</span> Equipment</a></li>
        </ul>
    </aside>

    <main class="admin-main">
        <div class="page-header">
            <h1>Student Management</h1>
            <div>
                <button class="btn-primary" id="addStudentBtn">
                    <span class="material-icons">add</span> Add Student
                </button>
                <button class="btn-primary" id="importCSVBtn">
                    <span class="material-icons">upload_file</span> Import CSV
                </button>
            </div>
        </div>

        <div class="card">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search by name, ID, or department...">
                <select id="statusFilter">
                    <option value="all">All Students</option>
                    <option value="active">Active</option>
                    <option value="suspended">Suspended</option>
                </select>
            </div>
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr><th>ID</th><th>Name</th><th>Department</th><th>Email</th><th>Phone</th><th>Status</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="studentsList"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Student Modal -->
    <div id="studentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Add Student</h3>
                <span class="modal-close" id="closeModalBtn">&times;</span>
            </div>
            <div class="modal-body">
                <form id="studentForm">
                    <input type="hidden" id="studentId">
                    <div class="form-group"><label>Student ID</label><input type="text" id="stdId" required></div>
                    <div class="form-group"><label>Full Name</label><input type="text" id="stdName" required></div>
                    <div class="form-group">
                        <label>Department</label>
                        <select id="stdDept">
                            <option>CSE</option><option>EEE</option><option>ME</option><option>CE</option><option>ECE</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Email</label><input type="email" id="stdEmail" required></div>
                    <div class="form-group"><label>Phone</label><input type="tel" id="stdPhone"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" id="saveStudentBtn">Save</button>
                <button class="btn-danger" id="cancelModalBtn">Cancel</button>
            </div>
        </div>
    </div>

    <!-- View Student Modal -->
    <div id="viewModal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h3>Student Details</h3>
                <span class="modal-close" id="closeViewModalBtn">&times;</span>
            </div>
            <div class="modal-body" id="viewStudentContent"></div>
        </div>
    </div>

    <script src="js/admin.js"></script>
    <script src="js/students.js"></script>
</body>
</html>
