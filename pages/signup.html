<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | CUET Gym Assistant</title>
    <link rel="stylesheet" href="../styles/signup.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="signup-container">
        <div class="signup-card">
            <div class="signup-header">
                <h1>Create Account</h1>
                <p>Join CUET Gym Assistant today</p>
            </div>
            
            <form id="signupForm">
                <div class="form-group">
                    <label>Student ID (CUET ID)</label>
                    <input type="text" id="studentId" placeholder="e.g., 2021001" required>
                </div>
                
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fullname" placeholder="Your full name" required>
                </div>
                
                <div class="form-group">
                    <label>Department</label>
                    <select id="department" required>
                        <option value="">Select Department</option>
                        <option>CSE</option>
                        <option>EEE</option>
                        <option>ME</option>
                        <option>CE</option>
                        <option>ECE</option>
                        <option>IPE</option>
                        <option>URP</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Choose a username" required>
                </div>
                
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="your@cuet.ac.bd" required>
                </div>
                
                <div class="form-group">
                    <label>Phone Number (Optional)</label>
                    <input type="tel" id="phone" placeholder="01XXXXXXXXX">
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Minimum 6 characters" required>
                </div>
                
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Re-enter password" required>
                </div>
                
                <button type="submit" class="signup-btn">Sign Up</button>
                
                <div class="login-link">
                    Already have an account? <a href="login.html">Login here</a>
                </div>
            </form>
        </div>
    </div>
    
    <script src="../scripts/signup.js"></script>
</body>
</html>
